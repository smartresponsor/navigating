# ---------------------------------------------------------------------------
# Cruding token grammar
# ---------------------------------------------------------------------------
# Back-office CRUD entry points are mounted under APP_BACK_TOKEN and guarded by ROLE_ADMIN.
# EasyAdmin remains the native CRUD executor.
# ---------------------------------------------------------------------------

navigation.menu.index:
  path: /navigation/menu/index
  methods: [GET]
  ea_crud_action: index
navigation.menu.show_id:
  path: /navigation/menu/show/{id}
  methods: [GET]
  ea_crud_action: detail
  resolver: id
navigation.menu.show_slug:
  path: /navigation/menu/show/{slug}
  methods: [GET]
  ea_crud_action: detail
  resolver: slug
navigation.menu.new:
  path: /navigation/menu/new
  methods: [GET]
  ea_crud_action: new
navigation.menu.create:
  path: /navigation/menu/create
  methods: [POST]
  ea_crud_action: new
navigation.menu.edit_id:
  path: /navigation/menu/edit/{id}
  methods: [GET]
  ea_crud_action: edit
  resolver: id
navigation.menu.edit_slug:
  path: /navigation/menu/edit/{slug}
  methods: [GET]
  ea_crud_action: edit
  resolver: slug
navigation.menu.update_id:
  path: /navigation/menu/update/{id}
  methods: [POST]
  ea_crud_action: edit
  resolver: id
navigation.menu.update_slug:
  path: /navigation/menu/update/{slug}
  methods: [POST]
  ea_crud_action: edit
  resolver: slug
navigation.menu.delete_id:
  path: /navigation/menu/delete/{id}
  methods: [POST]
  ea_crud_action: detail
  resolver: id
navigation.menu.delete_slug:
  path: /navigation/menu/delete/{slug}
  methods: [POST]
  ea_crud_action: detail
  resolver: slug
navigation.menu.bulk:
  path: /navigation/menu/bulk
  methods: [POST]
  ea_crud_action: bulkItems
navigation.menu.import:
  path: /navigation/menu/import
  methods: [GET, POST]
  ea_crud_action: importItems
navigation.menu.export:
  path: /navigation/menu/export
  methods: [GET]
  ea_crud_action: exportItems
navigation.menu.archive_id:
  path: /navigation/menu/archive/{id}
  methods: [POST]
  ea_crud_action: archiveItem
  resolver: id
navigation.menu.archive_slug:
  path: /navigation/menu/archive/{slug}
  methods: [POST]
  ea_crud_action: archiveItem
  resolver: slug
navigation.menu.restore_id:
  path: /navigation/menu/restore/{id}
  methods: [POST]
  ea_crud_action: restoreItem
  resolver: id
navigation.menu.restore_slug:
  path: /navigation/menu/restore/{slug}
  methods: [POST]
  ea_crud_action: restoreItem
  resolver: slug
navigation.menu.duplicate_id:
  path: /navigation/menu/duplicate/{id}
  methods: [POST]
  ea_crud_action: duplicateItem
  resolver: id
navigation.menu.duplicate_slug:
  path: /navigation/menu/duplicate/{slug}
  methods: [POST]
  ea_crud_action: duplicateItem
  resolver: slug
