      slot: right.quick.menu
      type: navigation
      priority: 30
      metadata:
        interface_location: true
    shell.left.top:
      label: Left top
      description: Workspace shortcuts at the top of the left rail.
      region: left
      slot: top
      type: navigation
      priority: 40
      metadata:
        interface_location: true
    shell.left.middle:
      label: Left middle
      description: Primary business navigation in the left rail.
      region: left
      slot: middle
      type: navigation
      priority: 50
      metadata:
        interface_location: true
    shell.left.bottom:
      label: Left bottom
      description: System/admin navigation at the bottom of the left rail.
      region: left
      slot: bottom
      type: navigation
      priority: 60
      metadata:
        interface_location: true
    shell.context.top:
