      priority: 90 # After business menu.
      visible_for_roles: # Section visible only for admin roles.
        - ROLE_ADMIN # Admin can see platform tools.
        - ROLE_SUPER_ADMIN # Super admin can see platform tools.
      items:
        access:
          type: link # Clickable index link.
          label: Access # Access management index.
          icon: lock # Lock/access icon key.
          priority: 20 # Item order.
          path: /access/index # Access index surface; avoids old User-token route.
          metadata:
            business_visible: true # Renderable in business shell for admins.
            route_name: access.index # Canonical route name if route exists.
            domain: access # Logical domain.
            resource: access # Logical resource.
            operation: index # LEFT MENU RULE: index only.
            navigation_scope: system # System/admin navigation scope.
            root_only: true # Root-level system section only.
            crud_index_only: true # No CRUD action links in left menu.
            admin_only: true # Admin-only semantic marker.
          visible_for_roles:
