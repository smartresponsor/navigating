      description: Top related business context area.
      region: context
      slot: top
      type: context
      priority: 70
      metadata:
        interface_location: true
    shell.context.middle:
      label: Context middle
      description: Main related business context area.
      region: context
      slot: middle
      type: context
      priority: 80
      metadata:
        interface_location: true
    shell.context.bottom:
      label: Context bottom
      description: Bottom related/system context area.
      region: context
      slot: bottom
      type: context
      priority: 90
      metadata:
        interface_location: true
    shell.main.top:
      label: Main top
      description: Top content-area location before toolbar/content.
