  shell_groups:
    body_top_workspace: # Small status strip above the application body.
      label: Store workspace # User-facing name of the status group.
      location: shell.body.top # Interfacing location: top status area.
      type: status # Render as status/badge content, not as menu.
      priority: 10 # Lower number renders earlier.
      items:
        workspace:
          type: badge # Non-clickable status badge.
          label: Commerce workspace # Shows the current workspace mode.
          icon: workspace # Icon key; renderer decides actual icon.
          badge: ready # Badge text/value.
          priority: 10 # Item order inside the group.
          metadata:
            business_visible: true # Available on business surfaces.
            surface: workspace # Semantic surface marker.

    header_bottom_breadcrumb: # Breadcrumb/navigation trail under the header.
      label: Breadcrumb # Group label for diagnostics/admin surfaces.
      location: shell.header.bottom # Interfacing location: header lower row.
      type: breadcrumb # Renderer may style this as breadcrumbs.
      priority: 20 # Renders after body status.
      items:
        home:
          type: link # Clickable link item.
          label: Home # User-facing breadcrumb label.
          icon: home # Icon key.
          priority: 10 # First breadcrumb.
          path: / # Public home entry.
          metadata:
            business_visible: true # Visible in business shell.
            surface: breadcrumb # Breadcrumb semantic marker.
        commerce:
          type: link # Clickable link item.
          label: Commerce # Root commerce workspace breadcrumb.
          icon: store # Storefront/business icon key.
          priority: 20 # Second breadcrumb.
          path: /app/ # Current app workspace entry.
          metadata:
            business_visible: true # Visible in business shell.
            route_name: app_guest_index # Host route if available.
            surface: breadcrumb # Breadcrumb semantic marker.

    left_top_workspace: # Primary workspace shortcuts.
      label: Workspace # Group label; may be displayed as a section heading.
      location: shell.left.top # Interfacing location: top of the left rail.
      type: navigation # Render as navigation links.
      priority: 20 # Top section in the left menu.
      items:
        dashboard:
          type: link # Clickable index link.
          label: Dashboard # Friendly workspace dashboard label.
          icon: dashboard # Dashboard icon key.
          priority: 10 # First item.
          path: /app/ # Host dashboard route.
          metadata:
            business_visible: true # Visible for business users.
            route_name: app_guest_index # Host route if available.
            domain: app # Logical domain.
            resource: dashboard # Logical resource.
            operation: index # LEFT MENU RULE: index only.
            navigation_scope: workspace # Workspace navigation scope.
            crud_index_only: true # Guard marker: no CRUD actions here.
        search:
          type: link # Clickable index link.
          label: Search # Global search entry.
          icon: search # Search icon key.
          priority: 20 # Second item.
          path: /search/query/index # Search index surface.
          metadata:
            business_visible: true # Visible for business users.
            route_name: search.query.index # Canonical route name.
            domain: search # Logical domain.
            resource: query # Logical resource.
            operation: index # LEFT MENU RULE: index only.
            navigation_scope: workspace # Workspace navigation scope.
            crud_index_only: true # Guard marker: no CRUD actions here.

