parameters:
  navigation.runtime_scope_default: ''
  navigation.runtime_entity_default: ''

services:
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      array $navigationConfig: '%navigation.config%'

  App\Navigating\:
    resource: '../src/'

  App\Navigating\ServiceInterface\Navigation\Normalize\NavigationConfigNormalizeServiceInterface:
    alias: App\Navigating\Service\Navigation\Normalize\NavigationConfigNormalizeService

  App\Navigating\ServiceInterface\Navigation\Validate\NavigationConfigValidateServiceInterface:
    alias: App\Navigating\Service\Navigation\Validate\NavigationConfigValidateService

  App\Navigating\ServiceInterface\Navigation\Filter\NavigationVisibilityFilterServiceInterface:
    alias: App\Navigating\Service\Navigation\Filter\NavigationVisibilityFilterService

  App\Navigating\ServiceInterface\Navigation\Build\NavigationTreeBuildServiceInterface:
    alias: App\Navigating\Service\Navigation\Build\NavigationTreeBuildService

  App\Navigating\ServiceInterface\Navigation\Resolve\NavigationTargetResolveServiceInterface:
    alias: App\Navigating\Service\Navigation\Resolve\NavigationTargetResolveService

  App\Navigating\ServiceInterface\Navigation\Provide\NavigationRequestRoleProvideServiceInterface:
    alias: App\Navigating\Service\Navigation\Provide\NavigationRequestRoleProvideService

  App\Navigating\ServiceInterface\Navigation\Provide\NavigationRuntimeActivationProvideServiceInterface:
    alias: App\Navigating\Service\Navigation\Provide\NavigationRuntimeActivationProvideService

  App\Navigating\Service\Navigation\Provide\NavigationRuntimeActivationProvideService:
    arguments:
      $runtimeScope: '%env(default:navigation.runtime_scope_default:APP_RUNTIME_SCOPE)%'
      $runtimeEntity: '%env(default:navigation.runtime_entity_default:APP_RUNTIME_ENTITY)%'
      $runtimeActivationStrict: true

  App\Navigating\ServiceInterface\Navigation\Provide\NavigationShellProvideServiceInterface:
    alias: App\Navigating\Service\Navigation\Provide\NavigationShellProvideService

  App\Navigating\ServiceInterface\Navigation\Provide\NavigationGroupProvideServiceInterface:
    alias: App\Navigating\Service\Navigation\Provide\NavigationGroupProvideService

  App\Navigating\ServiceInterface\Navigation\Provide\NavigationTemplateDataProvideServiceInterface:
    alias: App\Navigating\Service\Navigation\Provide\NavigationTemplateDataProvideService

  navigating.template_data_provider:
    alias: App\Navigating\Service\Navigation\Provide\NavigationTemplateDataProvideService
    public: true

  App\Navigating\ServiceInterface\Navigation\Provide\NavigationShellPayloadProvideServiceInterface:
    alias: App\Navigating\Service\Navigation\Provide\NavigationShellPayloadProvideService

  navigating.shell_payload_provider:
    alias: App\Navigating\Service\Navigation\Provide\NavigationShellPayloadProvideService
    public: true

  App\Navigating\ServiceInterface\Navigation\Provide\NavigationResponseProvideServiceInterface:
    alias: App\Navigating\Service\Navigation\Provide\NavigationResponseProvideService

  navigating.response_provider:
    alias: App\Navigating\Service\Navigation\Provide\NavigationResponseProvideService
    public: true

  App\Navigating\ServiceInterface\Navigation\Provide\NavigationInterfaceLocationProjectionProviderInterface:
    alias: App\Navigating\Service\Navigation\Provide\NavigationInterfaceLocationProjectionProvider

  navigating.interface_location_projection_provider:
    class: App\Navigating\Service\Navigation\Provide\NavigationInterfaceLocationProjectionProvider
    public: true

  App\Navigating\ServiceInterface\Navigation\Merge\NavigationShellChromeMergeServiceInterface:
    alias: App\Navigating\Service\Navigation\Merge\NavigationShellChromeMergeService

  App\Navigating\ServiceInterface\Navigation\Render\NavigationRenderServiceInterface:
    alias: App\Navigating\Service\Navigation\Render\NavigationRenderService

  navigating.renderer:
    alias: App\Navigating\Service\Navigation\Render\NavigationTemplateRenderService
    public: true

  App\Navigating\ServiceInterface\Navigation\Render\NavigationTemplateRenderServiceInterface:
    alias: App\Navigating\Service\Navigation\Render\NavigationTemplateRenderService

  App\Navigating\ServiceInterface\Navigation\NavigationRendererInterface:
    alias: App\Navigating\Service\Navigation\Render\NavigationTemplateRenderService

  App\Navigating\Service\Twig\Navigation\NavigationTwigExtension:
    tags:
      - twig.extension

  App\Navigating\Service\Http\Navigation\NavigationHttpService:
    tags:
      - { name: controller.service_arguments }
