# Navigation shell group: right_top_toggles.
navigation:
  shell_groups:
    right_top_toggles:
      label: Toggles
      location: shell.right.top
      type: toggle
      priority: 55
      items:
        command_palette:
          type: action
          label: Command palette
          icon: CodeOutlined
          action: navigation.toggle.command_palette
          priority: 10
          metadata:
            business_visible: true
            toggle: command_palette
        tools_panel:
          type: action
          label: Tools panel
          icon: ToolOutlined
          action: navigation.toggle.tools_panel
          priority: 20
          metadata:
            business_visible: true
            toggle: tools_panel
        filter_panel:
          type: action
          label: Filters
          icon: FilterOutlined
          action: navigation.toggle.filter_panel
          priority: 30
          metadata:
            business_visible: true
            toggle: filter_panel
        compact_navigation:
          type: action
          label: Compact navigation
          icon: CompressOutlined
          action: navigation.toggle.compact_navigation
          priority: 40
          metadata:
            business_visible: true
            toggle: compact_navigation
        developer_surface:
          type: action
          label: Developer surface
          icon: CodeOutlined
          action: navigation.toggle.developer_surface
          priority: 50
          visible_for_environments:
          - dev
          metadata:
            business_visible: true
            toggle: developer_surface
