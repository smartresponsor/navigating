# Navigation shell group: main_toolbar_actions.
navigation:
  shell_groups:
    main_toolbar_actions:
      label: Page actions
      location: shell.main.toolbar
      type: toolbar
      priority: 50
      visible_for_roles:
      - ROLE_ADMIN
      items:
        create:
          type: link
          label: Create
          icon: PlusOutlined
          priority: 10
          path: /navigation/new
          metadata:
            business_visible: true
            crud: true
            route_name: navigation.new
            operation: new
            surface: easyadmin
        import:
          type: link
          label: Import
          icon: ImportOutlined
          priority: 20
          path: /navigation/import
          metadata:
            business_visible: true
            crud: true
            route_name: navigation.import
            operation: import
            surface: easyadmin
        export:
          type: link
          label: Export
          icon: ExportOutlined
          priority: 30
          path: /navigation/export
          metadata:
            business_visible: true
            crud: true
            route_name: navigation.export
            operation: export
            surface: easyadmin
        refresh:
          type: action
          label: Refresh
          icon: ReloadOutlined
          action: navigation.refresh
          priority: 40
          metadata:
            business_visible: true
            operation: refresh
        publish:
          type: action
          label: Publish
          icon: CloudUploadOutlined
          action: navigation.publish
          priority: 50
          metadata:
            business_visible: true
            operation: publish
